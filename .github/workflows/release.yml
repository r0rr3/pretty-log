name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Intel Mac — must use macos-13 (x86_64 runner)
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: pretty-log-x86_64-apple-darwin.tar.gz

          # Apple Silicon — macos-latest is now ARM64 (M1/M2)
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: pretty-log-aarch64-apple-darwin.tar.gz

          # Linux x86_64 — native
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: pretty-log-x86_64-unknown-linux-gnu.tar.gz

          # Linux ARM64 — cross-compile with `cross`
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: pretty-log-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: ${{ matrix.use_cross == true }}
        run: cargo install cross

      - name: Build
        if: ${{ matrix.use_cross != true }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cross
        if: ${{ matrix.use_cross == true }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/pretty ./pretty
          tar czf ${{ matrix.asset_name }} pretty

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout main branch so we can commit the updated formula back
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          SHA_X86_MAC=$(sha256sum artifacts/pretty-log-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_ARM_MAC=$(sha256sum artifacts/pretty-log-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_LNX=$(sha256sum artifacts/pretty-log-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_ARM_LNX=$(sha256sum artifacts/pretty-log-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          # Unquoted heredoc: bash expands ${VERSION} and ${SHA_*},
          # but leaves #{bin} intact for Ruby to interpret
          cat > Formula/pretty-log.rb << EOF
class PrettyLog < Formula
  desc "A fast log prettifier for JSON logs with streaming support"
  homepage "https://github.com/r0rr3/pretty-log"
  version "${VERSION}"
  license "MIT"

  on_macos do
    on_arm64 do
      url "https://github.com/r0rr3/pretty-log/releases/download/v${VERSION}/pretty-log-aarch64-apple-darwin.tar.gz"
      sha256 "${SHA_ARM_MAC}"
    end
    on_intel do
      url "https://github.com/r0rr3/pretty-log/releases/download/v${VERSION}/pretty-log-x86_64-apple-darwin.tar.gz"
      sha256 "${SHA_X86_MAC}"
    end
  end

  on_linux do
    on_arm64 do
      url "https://github.com/r0rr3/pretty-log/releases/download/v${VERSION}/pretty-log-aarch64-unknown-linux-gnu.tar.gz"
      sha256 "${SHA_ARM_LNX}"
    end
    on_intel do
      url "https://github.com/r0rr3/pretty-log/releases/download/v${VERSION}/pretty-log-x86_64-unknown-linux-gnu.tar.gz"
      sha256 "${SHA_X86_LNX}"
    end
  end

  def install
    bin.install "pretty"
  end

  test do
    output = shell_output("echo '{\"level\":\"info\",\"msg\":\"hello\"}' | #{bin}/pretty --no-color")
    assert_match "INFO", output
    assert_match "hello", output
  end
end
EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pretty-log.rb
          git commit -m "chore: update formula to v${VERSION}" || echo "No changes to commit"
          git push

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: false

  build-and-upload:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: pretty
            asset_name: pretty-log-x86_64-apple-darwin.tar.gz

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pretty
            asset_name: pretty-log-aarch64-apple-darwin.tar.gz

          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pretty
            asset_name: pretty-log-x86_64-unknown-linux-gnu.tar.gz

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: pretty
            asset_name: pretty-log-aarch64-unknown-linux-gnu.tar.gz

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM64 on Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build (using cargo)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (using cross for ARM64 on Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          mkdir -p release_assets
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }}.exe release_assets/
            cd release_assets
            7z a ${{ matrix.asset_name }} ${{ matrix.artifact_name }}.exe
          else
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release_assets/
            cd release_assets
            tar czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          fi
        shell: bash

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./release_assets/${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/gzip

  update-homebrew-formula:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download all artifacts
        run: |
          mkdir -p artifacts
          cd artifacts
          # Download all release assets
          gh release download ${{ github.ref_name }} --dir .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate SHA256 hashes
        run: |
          cd artifacts
          sha256sum pretty-log-x86_64-apple-darwin.tar.gz > checksums.txt
          sha256sum pretty-log-aarch64-apple-darwin.tar.gz >> checksums.txt
          sha256sum pretty-log-x86_64-unknown-linux-gnu.tar.gz >> checksums.txt
          sha256sum pretty-log-aarch64-unknown-linux-gnu.tar.gz >> checksums.txt
          cat checksums.txt

      - name: Generate updated formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"

          SHA256_X86_DARWIN=$(sha256sum artifacts/pretty-log-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA256_ARM_DARWIN=$(sha256sum artifacts/pretty-log-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA256_X86_LINUX=$(sha256sum artifacts/pretty-log-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA256_ARM_LINUX=$(sha256sum artifacts/pretty-log-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          cat > Formula/pretty-log.rb << 'EOF'
class PrettyLog < Formula
  desc "A fast log prettifier for JSON logs with streaming support"
  homepage "https://github.com/r0rr3/pretty-log"
  version "VERSION_PLACEHOLDER"
  license "MIT"

  on_macos do
    on_arm64 do
      url "https://github.com/r0rr3/pretty-log/releases/download/vVERSION_PLACEHOLDER/pretty-log-aarch64-apple-darwin.tar.gz"
      sha256 "SHA256_ARM_DARWIN_PLACEHOLDER"
    end
    on_intel do
      url "https://github.com/r0rr3/pretty-log/releases/download/vVERSION_PLACEHOLDER/pretty-log-x86_64-apple-darwin.tar.gz"
      sha256 "SHA256_X86_DARWIN_PLACEHOLDER"
    end
  end

  on_linux do
    on_arm64 do
      url "https://github.com/r0rr3/pretty-log/releases/download/vVERSION_PLACEHOLDER/pretty-log-aarch64-unknown-linux-gnu.tar.gz"
      sha256 "SHA256_ARM_LINUX_PLACEHOLDER"
    end
    on_intel do
      url "https://github.com/r0rr3/pretty-log/releases/download/vVERSION_PLACEHOLDER/pretty-log-x86_64-unknown-linux-gnu.tar.gz"
      sha256 "SHA256_X86_LINUX_PLACEHOLDER"
    end
  end

  def install
    bin.install "pretty"
  end

  test do
    output = shell_output("echo '{\"level\":\"info\",\"msg\":\"hello\"}' | #{bin}/pretty --no-color")
    assert_match /INFO/, output
    assert_match /hello/, output
  end
end
EOF

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Formula/pretty-log.rb
          sed -i "s/SHA256_X86_DARWIN_PLACEHOLDER/$SHA256_X86_DARWIN/g" Formula/pretty-log.rb
          sed -i "s/SHA256_ARM_DARWIN_PLACEHOLDER/$SHA256_ARM_DARWIN/g" Formula/pretty-log.rb
          sed -i "s/SHA256_X86_LINUX_PLACEHOLDER/$SHA256_X86_LINUX/g" Formula/pretty-log.rb
          sed -i "s/SHA256_ARM_LINUX_PLACEHOLDER/$SHA256_ARM_LINUX/g" Formula/pretty-log.rb

          cat Formula/pretty-log.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pretty-log.rb
          git commit -m "chore: update Homebrew formula with SHA256 checksums for ${{ github.ref_name }}" || echo "No changes to commit"
          git push

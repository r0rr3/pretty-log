name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Intel Mac — macos-13 is the x86_64 runner
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: pretty-log-x86_64-apple-darwin.tar.gz

          # Apple Silicon — macos-latest is now ARM64 (M1/M2)
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: pretty-log-aarch64-apple-darwin.tar.gz

          # Linux x86_64 — native
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: pretty-log-x86_64-unknown-linux-gnu.tar.gz

          # Linux ARM64 — cross-compile with `cross`
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: pretty-log-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: ${{ matrix.use_cross == true }}
        run: cargo install cross

      - name: Build
        if: ${{ matrix.use_cross != true }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cross
        if: ${{ matrix.use_cross == true }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/pretty ./pretty
          tar czf ${{ matrix.asset_name }} pretty

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          export VERSION=${GITHUB_REF#refs/tags/v}
          export SHA_X86_MAC=$(sha256sum artifacts/pretty-log-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          export SHA_ARM_MAC=$(sha256sum artifacts/pretty-log-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          export SHA_X86_LNX=$(sha256sum artifacts/pretty-log-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          export SHA_ARM_LNX=$(sha256sum artifacts/pretty-log-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          envsubst '${VERSION} ${SHA_X86_MAC} ${SHA_ARM_MAC} ${SHA_X86_LNX} ${SHA_ARM_LNX}' \
            < Formula/pretty-log.rb.tmpl > Formula/pretty-log.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pretty-log.rb
          git commit -m "chore: update formula to v${VERSION}" || echo "No changes to commit"
          git push
